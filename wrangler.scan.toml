name = "reposcout-scan-worker"
account_id = "YOUR_CLOUDFLARE_ACCOUNT_ID"
main = "src/scan-worker/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[triggers]
# 3×/day full scan + every hour for crawler-only lightweight pass
crons = ["0 0,8,16 * * *", "30 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "reposcout"
database_id = "YOUR_D1_DATABASE_ID"

[[kv_namespaces]]
binding = "CACHE"
id = "YOUR_KV_NAMESPACE_ID"

[ai]
binding = "AI"

[vars]
SUMMARY_MODEL             = "@cf/mistralai/mistral-small-3.1-24b-instruct"
SCAN_MAX_CONCURRENT_REPOS = "10"
# Crawler tuning — override these wrangler secrets if needed:
#   CRAWLER_LOOKBACK_HOURS  (default: 24)   — hours to look back on first run
#   CRAWLER_MAX_PAGES       (default: 5)    — GitHub Search pages per run (30 items each)
